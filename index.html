<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SNS 看板｜衣替えプランナー</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📢</text></svg>">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />  <style>
    /* ==============================
       CSS CUSTOM PROPERTIES
    ============================== */
    :root {
      --bg:        #f2f4f8;
      --panel:     #ffffff;
      --surface:   #f7f8fb;
      --card:      #ffffff;
      --card-h:    #f7f8fb;
      --border:    #e0e5ef;
      --border-h:  #c5cedf;
      --accent:    #4d9a00;
      --accent-d:  rgba(77, 154, 0, 0.08);
      --accent-g:  rgba(77, 154, 0, 0.15);
      --text:      #2d3a4e;
      --text-h:    #0f1a28;
      --muted:     #8a97ab;
      --muted-h:   #5a6a80;

      /* Platform colors */
      --x-c:    #374151;
      --ig-c:   #c2185b;
      --th-c:   #0277bd;
      --yt-c:   #c62828;
      --x-bg:   rgba(55,65,81,0.06);
      --ig-bg:  rgba(194,24,91,0.06);
      --th-bg:  rgba(2,119,189,0.06);
      --yt-bg:  rgba(198,40,40,0.06);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .syne { font-family: 'Syne', sans-serif; }

    /* ─── Scrollbar ─── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-h); }

    /* ─── Dot grid bg for left panel ─── */
    .dot-grid {
      background-image: radial-gradient(circle, #d0d8e8 1px, transparent 1px);
      background-size: 22px 22px;
    }

    /* ─── Header ─── */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 200;
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
      height: 60px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      justify-content: space-between;
      gap: 16px;
    }

    .logo-mark {
      width: 30px; height: 30px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
      box-shadow: 0 0 12px rgba(77,154,0,0.25);
    }

    /* ─── Layout ─── */
    .app-body {
      display: grid;
      grid-template-columns: 375px 1fr;
      min-height: calc(100vh - 60px);
    }

    /* ─── Left panel ─── */
    .left-panel {
      position: sticky;
      top: 60px;
      height: calc(100vh - 60px);
      overflow-y: auto;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 22px 20px 20px;
      gap: 18px;
    }

    /* ─── Section label ─── */
    .sec-label {
      font-family: 'Syne', sans-serif;
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* ─── Field label ─── */
    .field-label {
      font-size: 11.5px;
      font-weight: 600;
      color: var(--muted-h);
      display: block;
      margin-bottom: 6px;
      letter-spacing: 0.02em;
    }

    /* ─── Input fields ─── */
    .inp {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      color: var(--text-h);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      line-height: 1.5;
    }
    .inp:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(77,154,0,0.12);
      background: var(--card);
    }
    .inp::placeholder { color: var(--muted); }
    textarea.inp { resize: vertical; min-height: 86px; }

    /* ─── Input group ─── */
    .form-group { display: flex; flex-direction: column; }

    /* ─── Divider ─── */
    .divider {
      height: 1px;
      background: var(--border);
    }

    /* ─── Prompt preview ─── */
    .prompt-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 2px solid var(--accent);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 11px;
      color: var(--muted-h);
      font-family: 'Courier New', monospace;
      line-height: 1.65;
      max-height: 108px;
      overflow-y: auto;
      white-space: pre-wrap;
    }

    /* ─── Generate button ─── */
    .btn-gen {
      position: relative;
      background: var(--accent);
      color: #ffffff;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 13.5px;
      letter-spacing: 0.03em;
      border: none;
      border-radius: 10px;
      padding: 13px 20px;
      width: 100%;
      cursor: pointer;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
    }
    .btn-gen::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), transparent);
      transform: skewX(-20deg);
      transition: left 0s;
    }
    .btn-gen:hover::after { left: 150%; transition: left 0.55s; }
    .btn-gen:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(77,154,0,0.25); }
    .btn-gen:active { transform: translateY(0); }
    .btn-gen:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-gen:disabled::after { display: none; }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 14px rgba(77,154,0,0.2); }
      50%       { box-shadow: 0 0 28px rgba(77,154,0,0.4); }
    }
    .btn-gen.loading { animation: pulse-glow 1.4s ease-in-out infinite; }

    /* ─── Right panel ─── */
    .right-panel {
      padding: 22px 24px 40px;
      overflow-y: auto;
    }

    /* ─── Tab nav ─── */
    .tab-nav {
      display: flex;
      gap: 3px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
    }
    .tab-btn {
      flex: 1;
      padding: 8px 6px;
      border-radius: 7px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.18s, color 0.18s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active-x  { background: var(--x-bg);  color: var(--x-c);  font-weight: 600; }
    .tab-btn.active-ig { background: var(--ig-bg); color: var(--ig-c); font-weight: 600; }
    .tab-btn.active-th { background: var(--th-bg); color: var(--th-c); font-weight: 600; }
    .tab-btn.active-yt { background: var(--yt-bg); color: var(--yt-c); font-weight: 600; }

    /* ─── Tab sections ─── */
    .tab-section { display: none; }
    .tab-section.visible {
      display: block;
      animation: fadeSlideIn 0.28s ease;
    }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── Platform header ─── */
    .platform-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .platform-icon {
      width: 38px; height: 38px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    /* ─── Output card ─── */
    .out-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 14px;
      transition: border-color 0.2s;
    }
    .out-card:hover { border-color: var(--border-h); }

    .out-card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--card-h);
    }
    .out-card-label {
      font-family: 'Syne', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .out-card-body {
      padding: 13px 14px;
      font-size: 13.5px;
      line-height: 1.75;
      color: var(--text);
      white-space: pre-wrap;
    }

    /* ─── Left accent strip ─── */
    .out-card.x-card  { border-left: 3px solid var(--x-c); }
    .out-card.ig-card { border-left: 3px solid var(--ig-c); }
    .out-card.th-card { border-left: 3px solid var(--th-c); }
    .out-card.yt-card { border-left: 3px solid var(--yt-c); }

    /* ─── Copy button ─── */
    .copy-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 5px;
      padding: 3px 9px;
      font-size: 10.5px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .copy-btn:hover { color: var(--text-h); border-color: var(--border-h); }
    .copy-btn.ok { color: var(--accent); border-color: rgba(77,154,0,0.4); background: var(--accent-d); }

    /* ─── Skeleton ─── */
    .skel {
      background: linear-gradient(90deg, var(--surface) 25%, var(--card-h) 50%, var(--surface) 75%);
      background-size: 300% 100%;
      animation: shimmer 1.6s ease-in-out infinite;
      border-radius: 5px;
    }
    @keyframes shimmer {
      0%   { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }
    .skel-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 14px;
      border-left: 3px solid var(--border);
    }
    .skel-head {
      background: var(--card-h);
      padding: 9px 14px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .skel-body { padding: 14px; display: flex; flex-direction: column; gap: 8px; }

    /* ─── Stagger animation for output cards ─── */
    .out-card { opacity: 0; animation: cardAppear 0.35s ease forwards; }
    @keyframes cardAppear {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .out-card:nth-child(2) { animation-delay: 0.06s; }
    .out-card:nth-child(3) { animation-delay: 0.12s; }
    .out-card:nth-child(4) { animation-delay: 0.18s; }
    .out-card:nth-child(5) { animation-delay: 0.24s; }

    /* ─── Empty state ─── */
    .empty-state {
      text-align: center;
      padding: 72px 24px;
      color: var(--muted);
      animation: fadeSlideIn 0.4s ease;
    }
    .empty-icon { font-size: 44px; margin-bottom: 14px; opacity: 0.35; }

    /* ─── Status pill ─── */
    .status-pill {
      font-size: 10px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 3px 10px;
      border-radius: 99px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .status-pill.ready  { color: var(--accent); border-color: rgba(77,154,0,0.35); background: var(--accent-d); }
    .status-pill.gen    { color: #0277bd; border-color: rgba(2,119,189,0.3); background: rgba(2,119,189,0.07); }

    /* ─── Responsive ─── */
    @media (max-width: 820px) {
      .app-body { grid-template-columns: 1fr; }
      .left-panel { position: static; height: auto; }
    }

    /* ─── Load-in stagger for input fields ─── */
    .form-group { opacity: 0; animation: fadeSlideIn 0.3s ease forwards; }
    .form-group:nth-child(1) { animation-delay: 0.05s; }
    .form-group:nth-child(2) { animation-delay: 0.10s; }
    .form-group:nth-child(3) { animation-delay: 0.15s; }
    .form-group:nth-child(4) { animation-delay: 0.20s; }
  </style>
</head>
<body>

  <!-- ───────────────── HEADER ───────────────── -->
  <header class="app-header">
    <div style="display:flex;align-items:center;gap:11px;">
      <div class="logo-mark">📢</div>
      <div>
        <div class="syne" style="font-weight:800;font-size:15px;letter-spacing:0.01em;color:var(--text-h);">
          SNS 看板プランナー
        </div>
        <div style="font-size:10px;color:var(--muted);letter-spacing:0.04em;">
          Omnichannel Profile Planner
        </div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div id="status-pill" class="status-pill">● IDLE</div>
      <div class="status-pill" style="opacity:0.6;">Mock Mode</div>
    </div>
  </header>

  <!-- ───────────────── MAIN BODY ───────────────── -->
  <div class="app-body">

    <!-- ═══ LEFT PANEL ═══ -->
    <aside class="left-panel dot-grid">

      <!-- Section: 入力情報 -->
      <div>
        <div class="sec-label">▸ 入力情報</div>
        <div style="display:flex;flex-direction:column;gap:13px;">

          <div class="form-group">
            <label class="field-label" for="inp-target">
              ターゲット層
            </label>
            <input id="inp-target" class="inp" type="text"
              placeholder="例：30〜40代の働く女性" />
          </div>

          <div class="form-group">
            <label class="field-label" for="inp-theme">
              今月のメインテーマ / 投稿アイデア
            </label>
            <textarea id="inp-theme" class="inp"
              placeholder="例：秋の断捨離と心の整え方。物を手放すことで人間関係も変わる…"></textarea>
          </div>

          <div class="form-group">
            <label class="field-label" for="inp-season">
              現在の季節 / 月
            </label>
            <input id="inp-season" class="inp" type="text"
              placeholder="例：2025年10月・秋" />
          </div>

          <div class="form-group">
            <label class="field-label" for="inp-monetize">
              今月誘導したいマネタイズ導線
            </label>
            <input id="inp-monetize" class="inp" type="text"
              placeholder="例：LINE公式アカウントへの登録" />
          </div>

        </div>
      </div>

      <div class="divider"></div>

      <!-- Section: AIプロンプトプレビュー -->
      <div>
        <div class="sec-label">▸ AIプロンプトプレビュー</div>
        <div class="prompt-box" id="prompt-preview">入力欄を埋めるとプロンプトがここに展開されます...</div>
        <button id="copy-prompt-btn" class="copy-btn"
          style="margin-top:8px;width:100%;padding:6px;"
          onclick="copyFullPrompt()">プロンプト全文をコピー</button>
      </div>

      <!-- Generate button (push to bottom) -->
      <div style="margin-top:auto;">
        <button class="btn-gen" id="btn-gen" onclick="runGenerate()">
          ⚡ 一括プランニングを実行
        </button>
        <div style="text-align:center;margin-top:7px;font-size:10.5px;color:var(--muted);">
          4媒体のプロフィール衣替えプランを一括生成
        </div>
      </div>

    </aside><!-- ═══ / LEFT PANEL ═══ -->

    <!-- ═══ RIGHT PANEL ═══ -->
    <main class="right-panel">

      <!-- Tab nav -->
      <div style="margin-bottom:18px;">
        <div class="sec-label">▸ 生成結果</div>
        <div class="tab-nav" id="tab-nav">
          <button class="tab-btn" id="tab-x"  onclick="switchTab('x')">
            𝕏 Twitter
          </button>
          <button class="tab-btn" id="tab-ig" onclick="switchTab('ig')">
            📸 Instagram
          </button>
          <button class="tab-btn" id="tab-th" onclick="switchTab('th')">
            🧵 Threads
          </button>
          <button class="tab-btn" id="tab-yt" onclick="switchTab('yt')">
            🎬 YT / TikTok
          </button>
        </div>
      </div>

      <!-- Tab sections -->
      <div id="sec-x"  class="tab-section"></div>
      <div id="sec-ig" class="tab-section"></div>
      <div id="sec-th" class="tab-section"></div>
      <div id="sec-yt" class="tab-section"></div>

    </main><!-- ═══ / RIGHT PANEL ═══ -->

  </div><!-- /app-body -->

<!-- ═══════════════════════════════════════════════════════
     JAVASCRIPT
════════════════════════════════════════════════════════ -->
<script>
/* ──────────────────────────────────────────
   SYSTEM PROMPT TEMPLATE（LLM連携用）
   将来的にLLM APIへ渡す際に使用するプロンプト。
   buildPrompt(inputs) で変数を展開する。
────────────────────────────────────────── */
const SYSTEM_PROMPT_TEMPLATE = `あなたは凄腕のSNSアカウントプロデューサーです。
私が運用する複数媒体のSNSアカウントについて、入力された「今月のテーマ」に合わせた「表の顔（プロフィール等の衣替えプラン）」を一括で企画してください。
各プラットフォームの特性（テキスト重視、ビジュアル重視、親近感重視など）を踏まえて、統一感を持たせつつも媒体ごとに最適化されたアウトプットをお願いします。

【前提条件】
・ターゲット：\${target}
・今月のメインテーマ：\${theme}
・現在の季節/月：\${season}
・今月一番誘導したいマネタイズ導線：\${monetize}

【出力フォーマット】
以下の構成で、各媒体の具体的なアップデート案を出力してください。
1. X（Twitter）の衣替え
・アカウント名（サフィックス）：名前の後ろにつけるキャッチーな肩書き（例：名前＠〇〇）
・プロフィール文（160字以内）：今月のテーマとフォローメリットを簡潔に。
・ヘッダー画像案：Canvaで作れる具体的なデザインとキャッチコピー案。
・固定ポスト案：今月のマネタイズ導線へ誘導する、熱量の高い長文テキスト案。

2. Instagramの衣替え
・名前：検索に引っかかりやすいキーワードを含めた名前（例：名前｜〇〇）
・プロフィール文：箇条書きで視認性良く。今月の推しテーマを明記。
・ハイライト案：今月のテーマに合わせたハイライトのタイトルと、まとめる内容のアイデア。
・固定（ピン留め）投稿案：プロフィールトップに固定すべき、今月を象徴する画像・リール動画のテーマ案（最大3つ）。

3. Threadsの衣替え
・プロフィール文：XやInstagramよりも「等身大の人間味・リアルな悩み」を押し出した文章。
・固定スレッド案：フォロワーとの共感や対話を生むための、今月のテーマに沿ったテキスト案。

4. YouTube Shorts ＆ TikTokの衣替え（動画媒体）
・プロフィール説明文：どんな動画を発信しているか、今月の注力テーマは何かを簡潔に。
・チャンネルバナー（YouTube用）のコンセプト案。
・プロフィールトップに固定する「おすすめ動画（自己紹介代わりの動画）」の企画案。`;

/* ──────────────────────────────────────────
   プロンプト構築関数
   本番実装ではこの文字列をAPIのsystem/userに渡す
────────────────────────────────────────── */
function buildPrompt(inputs) {
  return SYSTEM_PROMPT_TEMPLATE
    .replace('${target}',   inputs.target   || '（未設定）')
    .replace('${theme}',    inputs.theme    || '（未設定）')
    .replace('${season}',   inputs.season   || '（未設定）')
    .replace('${monetize}', inputs.monetize || '（未設定）');
}

/* ──────────────────────────────────────────
   入力取得
────────────────────────────────────────── */
function getInputs() {
  return {
    target:   document.getElementById('inp-target').value.trim(),
    theme:    document.getElementById('inp-theme').value.trim(),
    season:   document.getElementById('inp-season').value.trim(),
    monetize: document.getElementById('inp-monetize').value.trim(),
  };
}

/* ──────────────────────────────────────────
   プロンプトプレビュー更新
────────────────────────────────────────── */
function refreshPromptPreview() {
  const inputs = getInputs();
  const box = document.getElementById('prompt-preview');
  const allEmpty = !inputs.target && !inputs.theme && !inputs.season && !inputs.monetize;
  if (allEmpty) {
    box.textContent = '入力欄を埋めるとプロンプトがここに展開されます...';
    return;
  }

/* ──────────────────────────────────────────
   メイン実行
────────────────────────────────────────── */
function runGenerate() {
  const inputs = getInputs();

  // テーマバリデーション
  if (!inputs.theme) {
    const el = document.getElementById('inp-theme');
    el.focus();
    el.style.borderColor = '#f87171';
    el.style.boxShadow   = '0 0 0 3px rgba(248,113,113,0.15)';
    setTimeout(() => { el.style.borderColor = ''; el.style.boxShadow = ''; }, 2200);
    return;
  }

  const btn = document.getElementById('btn-gen');
  btn.disabled = true;
  btn.textContent = '⏳ 生成中...';
  btn.classList.add('loading');
  setStatus('gen');

  // スケルトン表示 → 最初のタブへ
  showSkeletons();
  switchTab('x');

  /* ─────────────────────────────────────────
     ★ 本番実装時はここをLLM APIに差し替える ★
     const prompt = buildPrompt(inputs);
     const response = await fetch('https://api.anthropic.com/v1/messages', {
       method: 'POST',
       headers: {
         'x-api-key': YOUR_API_KEY,
         'anthropic-version': '2023-06-01',
         'content-type': 'application/json',
       },
       body: JSON.stringify({
         model: 'claude-opus-4-6',
         max_tokens: 3000,
         system: SYSTEM_PROMPT_TEMPLATE,
         messages: [{ role: 'user', content: prompt }],
       }),
     });
     const json = await response.json();
     const text = json.content[0].text;
     renderOutput(parseLLMResponse(text));
  ─────────────────────────────────────────── */

  setTimeout(() => {
    const mockData = genMockData(inputs);
    renderOutput(mockData);
    btn.disabled = false;
    btn.classList.remove('loading');
    btn.textContent = '🔄 再生成する';
    setStatus('ready');
    setTimeout(() => { btn.textContent = '⚡ 一括プランニングを実行'; }, 3500);
  }, 2300);
}
